<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔢 2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e6f1ff;
      padding: 20px;
    }

    a.home-btn {
      position: fixed;
      top: 14px; left: 14px;
      padding: 6px 14px;
      background: rgba(15,52,96,0.9);
      color: #a8b2d8;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid rgba(233,69,96,0.3);
      transition: all 0.2s;
      z-index: 99;
    }
    a.home-btn:hover { color: #fff; border-color: #e94560; }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #e94560;
      letter-spacing: 2px;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-box {
      background: #16213e;
      padding: 8px 20px;
      border-radius: 8px;
      text-align: center;
      min-width: 90px;
    }

    .score-box .label {
      font-size: 0.72rem;
      color: #a8b2d8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .val {
      font-size: 1.3rem;
      font-weight: 800;
      color: #e94560;
    }

    button {
      padding: 9px 20px;
      border: 2px solid #e94560;
      background: transparent;
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }
    button:hover { background: #e94560; color: #fff; }

    #board-wrap {
      position: relative;
      background: #16213e;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      touch-action: none;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 10px;
      position: relative;
    }

    .cell-bg {
      background: rgba(15,52,96,0.5);
      border-radius: 8px;
    }

    #tiles-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.8rem;
      font-weight: 900;
      transition: left 0.1s ease, top 0.1s ease;
      will-change: left, top;
    }

    .tile.new { animation: pop 0.15s ease; }
    .tile.merged { animation: bump 0.15s ease; }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Tile colors */
    .t2    { background: #0f3460; color: #e6f1ff; }
    .t4    { background: #1a4a7a; color: #e6f1ff; }
    .t8    { background: #ff8a65; color: #fff; font-size: 1.7rem; }
    .t16   { background: #f4511e; color: #fff; font-size: 1.6rem; }
    .t32   { background: #e94560; color: #fff; font-size: 1.5rem; }
    .t64   { background: #c62828; color: #fff; font-size: 1.4rem; }
    .t128  { background: #ffd54f; color: #333; font-size: 1.2rem; }
    .t256  { background: #ffb300; color: #333; font-size: 1.1rem; }
    .t512  { background: #ff6f00; color: #fff; font-size: 1rem; }
    .t1024 { background: #4fc3f7; color: #1a1a2e; font-size: 0.88rem; }
    .t2048 { background: #81c784; color: #1a1a2e; font-size: 0.82rem; }
    .tmax  { background: #ce93d8; color: #1a1a2e; font-size: 0.75rem; }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(26,26,46,0.88);
      border-radius: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    #overlay.show { display: flex; }
    #overlay h2 { font-size: 1.8rem; }
    #overlay h2.win { color: #81c784; }
    #overlay h2.lose { color: #e94560; }

    #message {
      margin-top: 12px;
      font-size: 1rem;
      color: #a8b2d8;
      min-height: 24px;
    }

    .hint {
      margin-top: 6px;
      color: #a8b2d8;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<a href="index.html" class="home-btn">← 홈</a>

<h1>🔢 2048</h1>

<div class="top-row">
  <div class="score-box">
    <div class="label">점수</div>
    <div class="val" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="label">최고</div>
    <div class="val" id="best">0</div>
  </div>
  <button onclick="newGame()">🔄 새 게임</button>
</div>

<div id="board-wrap">
  <div id="grid"></div>
  <div id="tiles-layer"></div>
  <div id="overlay">
    <h2 id="overlay-title"></h2>
    <button onclick="newGame()">다시 시작</button>
  </div>
</div>

<div id="message"></div>
<div class="hint">방향키 또는 스와이프로 타일 이동</div>

<script>
  const CELL = 100, GAP = 10, PAD = 10;
  const gridEl = document.getElementById('grid');
  const tilesLayer = document.getElementById('tiles-layer');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const msgEl = document.getElementById('message');

  let board, score, best, won, over, moving;
  best = parseInt(localStorage.getItem('2048_best') || '0');
  bestEl.textContent = best;

  function posToXY(r, c) {
    return { x: PAD + c * (CELL + GAP), y: PAD + r * (CELL + GAP) };
  }

  function newGame() {
    board = Array.from({ length: 4 }, () => Array(4).fill(0));
    score = 0;
    won = false;
    over = false;
    moving = false;
    scoreEl.textContent = 0;
    overlay.classList.remove('show');
    msgEl.textContent = '';
    buildGrid();
    addTile();
    addTile();
    renderTiles();
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    tilesLayer.innerHTML = '';
    for (let i = 0; i < 16; i++) {
      const d = document.createElement('div');
      d.className = 'cell-bg';
      gridEl.appendChild(d);
    }
  }

  function tileClass(v) {
    if (v >= 2048) return v > 2048 ? 'tmax' : 't2048';
    return 't' + v;
  }

  function renderTiles(newPos, mergedPos) {
    tilesLayer.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const v = board[r][c];
        if (!v) continue;
        const { x, y } = posToXY(r, c);
        const tile = document.createElement('div');
        tile.className = 'tile ' + tileClass(v);
        const key = r + ',' + c;
        if (newPos && newPos.has(key)) tile.classList.add('new');
        if (mergedPos && mergedPos.has(key)) tile.classList.add('merged');
        tile.style.left = x + 'px';
        tile.style.top = y + 'px';
        tile.textContent = v;
        tilesLayer.appendChild(tile);
      }
    }
  }

  function addTile() {
    const empty = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (!board[r][c]) empty.push([r, c]);
    if (!empty.length) return null;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
    return r + ',' + c;
  }

  function slide(row) {
    let nums = row.filter(x => x);
    let merged = false;
    const mergedIdx = new Set();
    for (let i = 0; i < nums.length - 1; i++) {
      if (!merged && nums[i] === nums[i + 1]) {
        nums[i] *= 2;
        score += nums[i];
        mergedIdx.add(i);
        nums.splice(i + 1, 1);
        merged = true;
      } else {
        merged = false;
      }
    }
    while (nums.length < 4) nums.push(0);
    return { row: nums, mergedIdx };
  }

  function move(dir) {
    if (over || moving) return;
    let changed = false;
    const mergedPos = new Set();

    const transform = (r, c) => {
      if (dir === 0) return [r, c];
      if (dir === 1) return [c, 3 - r];
      if (dir === 2) return [3 - r, c];
      return [c, r];
    };

    for (let i = 0; i < 4; i++) {
      let row = [];
      for (let j = 0; j < 4; j++) {
        const [r, c] = transform(i, j);
        row.push(board[r][c]);
      }
      const { row: newRow, mergedIdx } = slide(row);
      for (let j = 0; j < 4; j++) {
        const [r, c] = transform(i, j);
        if (board[r][c] !== newRow[j]) changed = true;
        board[r][c] = newRow[j];
        if (mergedIdx.has(j)) mergedPos.add(r + ',' + c);
      }
    }

    if (!changed) return;
    scoreEl.textContent = score;
    if (score > best) { best = score; localStorage.setItem('2048_best', best); bestEl.textContent = best; }

    const newKey = addTile();
    const newPos = newKey ? new Set([newKey]) : new Set();
    renderTiles(newPos, mergedPos);

    if (!won && board.flat().includes(2048)) {
      won = true;
      overlayTitle.textContent = '🎉 2048 달성!';
      overlayTitle.className = 'win';
      overlay.classList.add('show');
    } else if (isGameOver()) {
      over = true;
      overlayTitle.textContent = '😵 게임 오버';
      overlayTitle.className = 'lose';
      overlay.classList.add('show');
    }
  }

  function isGameOver() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        if (!board[r][c]) return false;
        if (r < 3 && board[r][c] === board[r+1][c]) return false;
        if (c < 3 && board[r][c] === board[r][c+1]) return false;
      }
    return true;
  }

  document.addEventListener('keydown', e => {
    const map = { ArrowLeft: 0, ArrowUp: 1, ArrowDown: 2, ArrowRight: 3 };
    if (map[e.key] !== undefined) { e.preventDefault(); move(map[e.key]); }
  });

  // Touch swipe
  let tx, ty;
  const bw = document.getElementById('board-wrap');
  bw.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
  bw.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 3 : 0);
    else move(dy > 0 ? 2 : 1);
    e.preventDefault();
  }, { passive: false });

  newGame();
</script>
</body>
</html>
