<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 뱀 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e6f1ff;
    }

    a.home-btn {
      position: fixed;
      top: 14px; left: 14px;
      padding: 6px 14px;
      background: rgba(15,52,96,0.9);
      color: #a8b2d8;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid rgba(233,69,96,0.3);
      transition: all 0.2s;
      z-index: 99;
    }
    a.home-btn:hover { color: #fff; border-color: #e94560; }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #e94560;
      letter-spacing: 2px;
    }

    .score-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 14px;
      background: #16213e;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 1rem;
    }

    .score-bar span { display: flex; align-items: center; gap: 6px; }
    .score-bar strong { color: #e94560; }

    #canvas {
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: block;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 9px 24px;
      border: 2px solid #e94560;
      background: transparent;
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, color 0.2s;
    }
    button:hover, button.active { background: #e94560; color: #fff; }

    #message {
      margin-top: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      min-height: 28px;
      color: #e94560;
    }
    #message.win { color: #81c784; }

    .hint {
      margin-top: 8px;
      color: #a8b2d8;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<a href="index.html" class="home-btn">← 홈</a>

<h1>🐍 뱀 게임</h1>

<div class="score-bar">
  <span>점수 <strong id="score">0</strong></span>
  <span>최고 <strong id="best">0</strong></span>
  <span>레벨 <strong id="level">1</strong></span>
</div>

<canvas id="canvas" width="420" height="420"></canvas>

<div class="controls">
  <button id="startBtn" onclick="startGame()">▶ 시작</button>
</div>

<div id="message">▶ 시작 버튼을 누르거나 방향키를 누르세요</div>
<div class="hint">방향키 또는 WASD로 조종 · 스페이스바로 일시정지</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const COLS = 21, ROWS = 21;
  const CELL = canvas.width / COLS;

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const msgEl = document.getElementById('message');

  let snake, dir, nextDir, food, score, gameLoop, running, paused;
  let best = parseInt(localStorage.getItem('snake_best') || '0');
  bestEl.textContent = best;

  const COLORS = {
    bg: '#0d1b2e',
    grid: '#0f2644',
    head: '#e94560',
    body: ['#c73652','#a02c43','#7a2235'],
    food: '#81c784',
    foodGlow: 'rgba(129,199,132,0.4)',
    text: '#e6f1ff',
  };

  function draw() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // Food glow
    ctx.shadowColor = COLORS.foodGlow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = COLORS.food;
    ctx.beginPath();
    ctx.roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake body
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? COLORS.head : COLORS.body[Math.min(i - 1, COLORS.body.length - 1)];
      ctx.beginPath();
      ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, i === 0 ? 5 : 3);
      ctx.fill();
    });

    // Eyes on head
    if (snake.length > 0) {
      ctx.fillStyle = '#fff';
      const h = snake[0];
      const ex1 = { x: 0, y: 0 }, ex2 = { x: 0, y: 0 };
      if (dir.x === 1) { ex1.x = CELL*0.7; ex1.y = CELL*0.25; ex2.x = CELL*0.7; ex2.y = CELL*0.65; }
      else if (dir.x === -1) { ex1.x = CELL*0.15; ex1.y = CELL*0.25; ex2.x = CELL*0.15; ex2.y = CELL*0.65; }
      else if (dir.y === -1) { ex1.x = CELL*0.25; ex1.y = CELL*0.15; ex2.x = CELL*0.65; ex2.y = CELL*0.15; }
      else { ex1.x = CELL*0.25; ex1.y = CELL*0.7; ex2.x = CELL*0.65; ex2.y = CELL*0.7; }
      ctx.beginPath(); ctx.arc(h.x * CELL + ex1.x, h.y * CELL + ex1.y, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(h.x * CELL + ex2.x, h.y * CELL + ex2.y, 2.5, 0, Math.PI*2); ctx.fill();
    }

    // Pause overlay
    if (paused && running) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e6f1ff';
      ctx.font = 'bold 28px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('⏸ 일시정지', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'left';
    }
  }

  function placeFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let pos;
    do { pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
    while (occupied.has(pos.x + ',' + pos.y));
    food = pos;
  }

  function getSpeed() {
    const lvl = Math.floor(score / 5) + 1;
    return Math.max(80, 200 - (lvl - 1) * 15);
  }

  function step() {
    if (paused) return;
    dir = nextDir;

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return endGame();
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      const lvl = Math.floor(score / 5) + 1;
      levelEl.textContent = lvl;
      if (score > best) { best = score; best = score; localStorage.setItem('snake_best', best); bestEl.textContent = best; }
      placeFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(step, getSpeed());
    } else {
      snake.pop();
    }

    draw();
  }

  function startGame() {
    clearInterval(gameLoop);
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    paused = false;
    running = true;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    msgEl.textContent = '';
    msgEl.className = '';
    placeFood();
    draw();
    gameLoop = setInterval(step, getSpeed());
  }

  function endGame() {
    clearInterval(gameLoop);
    running = false;
    draw();
    msgEl.textContent = '💥 게임 오버! 점수: ' + score;
  }

  document.addEventListener('keydown', e => {
    if (!running && (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'w' || e.key === 's' || e.key === 'a' || e.key === 'd')) {
      startGame();
    }
    if (e.key === ' ') {
      e.preventDefault();
      if (running) { paused = !paused; draw(); }
    }
    const map = {
      'ArrowUp': { x: 0, y: -1 }, 'w': { x: 0, y: -1 },
      'ArrowDown': { x: 0, y: 1 }, 's': { x: 0, y: 1 },
      'ArrowLeft': { x: -1, y: 0 }, 'a': { x: -1, y: 0 },
      'ArrowRight': { x: 1, y: 0 }, 'd': { x: 1, y: 0 },
    };
    if (map[e.key]) {
      e.preventDefault();
      const d = map[e.key];
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  // Touch swipe support
  let touchX, touchY;
  canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > Math.abs(dy)) {
      const d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
      if (d.x !== -dir.x) nextDir = d;
    } else {
      const d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
      if (d.y !== -dir.y) nextDir = d;
    }
    if (!running) startGame();
    e.preventDefault();
  }, { passive: false });

  // Initial draw
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#a8b2d8';
  ctx.font = '20px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText('▶ 시작 버튼을 눌러주세요', canvas.width / 2, canvas.height / 2);
  ctx.textAlign = 'left';
</script>
</body>
</html>
